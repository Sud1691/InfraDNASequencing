apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-dna-sequencer
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infra-dna-sequencer
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets", "nodes"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infra-dna-sequencer
subjects:
- kind: ServiceAccount
  name: infra-dna-sequencer
  namespace: platform
roleRef:
  kind: ClusterRole
  name: infra-dna-sequencer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snapshots-pvc
  namespace: platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: infra-snapshot
  namespace: platform
spec:
  schedule: "*/15 * * * *"  # Every 15 minutes
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: infra-dna-sequencer
          containers:
          - name: snapshot
            image: your-registry/infra-dna-sequencer:latest
            command: 
            - python
            - automated_sequencer.py
            - monitor
            - "15"
            env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-secret
                  key: api-key
            - name: TERRAFORM_DIR
              value: "/terraform"
            - name: VPC_ID
              value: "vpc-abc123"
            - name: PROMETHEUS_URL
              value: "http://prometheus:9090"
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: slack-secret
                  key: webhook-url
                  optional: true
            volumeMounts:
            - name: snapshots
              mountPath: /app/snapshots
            - name: incidents
              mountPath: /app/incidents
            - name: terraform
              mountPath: /terraform
              readOnly: true
          volumes:
          - name: snapshots
            persistentVolumeClaim:
              claimName: snapshots-pvc
          - name: incidents
            persistentVolumeClaim:
              claimName: snapshots-pvc
          - name: terraform
            configMap:
              name: terraform-config
              optional: true
          restartPolicy: OnFailure
